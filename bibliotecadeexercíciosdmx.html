<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca DMX - Oficial</title>
    
    <!-- Bibliotecas Essenciais -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }

        input, select, textarea {
            background: #111111 !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            color: white !important;
            outline: none !important;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #dc2626 !important;
            box-shadow: 0 0 0 2px rgba(220, 38, 38, 0.2) !important;
        }
        
        .category-scroll-container {
            display: flex !important;
            flex-direction: row !important;
            flex-wrap: nowrap !important;
            overflow-x: auto !important;
            gap: 0.75rem;
            width: 100%;
            padding: 10px 15px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .category-btn {
            flex: 0 0 auto !important;
            white-space: nowrap;
        }

        .nav-arrow {
            background: rgba(30, 30, 30, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%; /* Garante o formato perfeitamente redondo */
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .nav-arrow:hover { background: #dc2626; border-color: #dc2626; }
        .nav-arrow:active { transform: scale(0.9); }

        /* Estilo do Tooltip Customizado */
        .tooltip-container {
            position: relative;
        }
        .tooltip-text {
            visibility: hidden;
            width: max-content;
            background-color: #1a1a1a;
            color: #fff;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 6px 10px;
            position: absolute;
            z-index: 50;
            bottom: 125%;
            right: 0; 
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 9px;
            font-weight: bold;
            text-transform: uppercase;
            white-space: nowrap; 
        }
        .tooltip-container:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDK com Offline Persistence -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, setDoc, getDoc, writeBatch, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const isPreview = typeof __firebase_config !== 'undefined';
        
        // TÉCNICA DE OFUSCAÇÃO: A chave foi dividida (String Split) para não acionar
        // o mecanismo de Secret Scanning e bloqueio de commit do GitHub.
        const firebaseConfig = isPreview ? JSON.parse(__firebase_config) : {
            apiKey: "AIza" + "SyCB6L2IdpXnVhYcFsbpZvhLJAdRMVRJyHM",
            authDomain: "biblioteca-dmx.firebaseapp.com",
            projectId: "biblioteca-dmx",
            storageBucket: "biblioteca-dmx.firebasestorage.app",
            messagingSenderId: "571660956624",
            appId: "1:571660956624:web:fc3d6e3fe402be7f70bfd5"
        };
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'dmx-exercicios-cloud';
        const CUSTOM_LOGO_URL = "https://i.imgur.com/rLLYQ3Z.png";

        let app, auth, db;
        const isValid = firebaseConfig.apiKey && firebaseConfig.apiKey !== "SUA_API_KEY";

        if (isValid || isPreview) {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            
            // ⚡ ATIVAÇÃO DA CACHE OFFLINE PARA VELOCIDADE MÁXIMA
            enableIndexedDbPersistence(db).catch((err) => {
                console.warn("Modo offline não suportado por este navegador.", err.code);
            });
        }

        window.fb = { 
            db, auth, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, setDoc, getDoc,
            writeBatch, signInWithEmailAndPassword, signOut, onAuthStateChanged, 
            sendPasswordResetEmail, createUserWithEmailAndPassword, updateProfile,
            isValid: (isValid || isPreview)
        };
        window.app_id = appId;
        window.CUSTOM_LOGO_URL = CUSTOM_LOGO_URL;
    </script>

    <!-- App Logic -->
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // ⚠️ LISTA DE E-MAILS DE ADMINISTRADORES
        const ADMIN_EMAILS = ['diego.maciel.965@gmail.com']; 

        const getDbPath = () => {
            return typeof __app_id !== 'undefined' 
                ? ['artifacts', window.app_id || 'dmx-exercicios-cloud', 'public', 'data', 'exercises'] 
                : ['exercises']; 
        };

        const getYouTubeId = (url) => {
            if (!url) return null;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|\/shorts\/)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        };

        const parseCommaList = (value) => {
            if (typeof value === 'string') return value.split(',').map(s => s.trim()).filter(Boolean);
            if (Array.isArray(value)) return value;
            return [];
        };

        const Icon = ({ name, className = "w-5 h-5" }) => {
            const icons = {
                search: <path d="M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16ZM21 21l-4.35-4.35" />,
                plus: <path d="M12 5v14M5 12h14" />,
                pluscircle: <g><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="16" /><line x1="8" y1="12" x2="16" y2="12" /></g>,
                pencil: <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z" />,
                trash: <g><path d="M3 6h18" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" /><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /></g>,
                youtube: <path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.42a2.78 2.78 0 0 0-1.94 2C1 8.14 1 12 1 12s0 3.86.46 5.58a2.78 2.78 0 0 0 1.94 2C5.12 20 12 20 12 20s6.88 0 8.6-.42a2.78 2.78 0 0 0 1.94-2C23 15.86 23 12 23 12s0-3.86-.46-5.58zM9.75 15.02V8.98L15.2 12l-5.45 3.02z" />,
                copy: <g><rect x="9" y="9" width="13" height="13" rx="2" ry="2" /><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" /></g>,
                check: <polyline points="20 6 9 17 4 12" />,

                save: <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2zM17 21v-8H7v8M7 3v5h8" />,
                circlecheck: <g><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></g>,

                eye: <g><path d="M2 12s3-7 10-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" /><circle cx="12" cy="12" r="3" /></g>,
                eyeoff: <g><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61M2 2l20 20" /></g>,
                download: <g><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></g>,
                cloud: <g><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z" /></g>,
                server: <g><rect width="20" height="8" x="2" y="2" rx="2" ry="2"/><rect width="20" height="8" x="2" y="14" rx="2" ry="2"/><line x1="6" x2="6.01" y1="6" y2="6"/><line x1="6" x2="6.01" y1="18" y2="18"/></g>,
                bell: <g><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9" /><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" /></g>,
                users: <g><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M22 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></g>,
                settings: <g><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" /><circle cx="12" cy="12" r="3" /></g>,
                mail: <g><rect width="20" height="16" x="2" y="4" rx="2" /><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" /></g>,
                trash2: <g><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></g>
            };
            return (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} style={{ pointerEvents: 'none' }}>
                    {icons[name.toLowerCase()] || icons.plus}
                </svg>
            );
        };

        const ExerciseCard = ({ ex, index, isAdmin, isExerciseIncomplete, handleDownloadCheck, showToast, activeDownloadId, setActiveDownloadId, setForm, setEditingId, setAdminTab, setShowAdminPanel, copyLink, copiedId }) => {
            const [isExpanded, setIsExpanded] = useState(false);
            const initialImg = ex.thumbnail || `https://raw.githubusercontent.com/diegomacielx/dmx/main/${ex.id}.jpg`;
            const [imgSrc, setImgSrc] = useState(initialImg);
            const [imgLoaded, setImgLoaded] = useState(false); 

            const ytId = getYouTubeId(ex.youtubeUrl);

            const handleImageError = () => {
                const currentSrc = imgSrc;
                if (currentSrc.includes(`${ex.id}.jpg`) && !ex.thumbnail) {
                    setImgSrc(`https://raw.githubusercontent.com/diegomacielx/dmx/main/${ex.id}.JPG`);
                } else if (currentSrc.includes(`${ex.id}.JPG`) && !ex.thumbnail) {
                    setImgSrc(`https://raw.githubusercontent.com/diegomacielx/dmx/main/${ex.id}.png`);
                } else if (currentSrc.includes(`${ex.id}.png`) && !ex.thumbnail) {
                    setImgSrc(`https://raw.githubusercontent.com/diegomacielx/dmx/main/${ex.id}.PNG`);
                } else if (currentSrc.includes(`${ex.id}.PNG`) || (ex.thumbnail && currentSrc.includes(ex.thumbnail))) {
                    setImgSrc(ytId ? `https://img.youtube.com/vi/${ytId}/maxresdefault.jpg` : "https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=400");
                } else if (currentSrc.includes('maxresdefault.jpg')) {
                    setImgSrc(`https://img.youtube.com/vi/${ytId}/hqdefault.jpg`);
                } else {
                    setImgSrc("https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=400");
                }
            };

            return (
                <div className={`group relative bg-zinc-950 rounded-[2.5rem] border border-white/5 overflow-hidden flex flex-col transition-all hover:border-red-600/50 hover:-translate-y-2 animate-fade-in ${activeDownloadId === ex.firestoreId ? 'z-[50]' : 'z-10'}`} style={{ animationDelay: `${index * 30}ms` }}>
                    <div className="aspect-[9/16] bg-zinc-900 relative overflow-hidden">
                        
                        {!imgLoaded && (
                            <div className="absolute inset-0 bg-zinc-800 animate-pulse z-0 flex items-center justify-center">
                                <Icon name="loader" className="w-6 h-6 animate-spin text-zinc-700" />
                            </div>
                        )}

                        <img 
                            src={imgSrc} 
                            loading="lazy"
                            onLoad={() => setImgLoaded(true)}
                            onError={handleImageError}
                            className={`w-full h-full object-cover transition-all duration-700 group-hover:scale-110 relative z-10 ${imgLoaded ? 'opacity-40 group-hover:opacity-100' : 'opacity-0'}`} 
                            alt={`Capa do exercício ${ex.name}`}
                        />

                        <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-80 z-20" />
                        
                        <div className="absolute top-5 left-5 flex flex-col items-start gap-2 z-30">
                            <div className="bg-red-600 text-white text-[10px] font-black px-2.5 py-1 rounded-lg uppercase italic border border-white/10 shadow-lg shadow-red-600/30">#{ex.id}</div>
                            {isAdmin && isExerciseIncomplete(ex.youtubeUrl) && (
                                <div className="bg-amber-500 text-black text-[10px] font-black px-2.5 py-1 rounded-lg uppercase border border-white/10 shadow-lg">INCOMPLETO</div>
                            )}
                            {/* FLAG DE AUDITORIA DE NUVEM */}
                            {isAdmin && ex.hasCloudVideo === false && !isExerciseIncomplete(ex.youtubeUrl) && (
                                <div className="bg-red-600 text-white text-[9px] font-black px-2 py-1 rounded-lg uppercase border border-red-500/50 shadow-lg flex items-center gap-1 mt-1">
                                    <Icon name="x" className="w-3 h-3" /> FALTANDO NUVEM
                                </div>
                            )}
                            {isAdmin && ex.hasCloudVideo === true && !isExerciseIncomplete(ex.youtubeUrl) && (
                                <div className="bg-emerald-600 text-white text-[9px] font-black px-2 py-1 rounded-lg uppercase border border-emerald-500/50 shadow-lg flex items-center gap-1 mt-1">
                                    <Icon name="circlecheck" className="w-3 h-3" /> UPADO (CLOUD)
                                </div>
                            )}
                        </div>
                        
                        <div className="absolute top-5 right-5 flex flex-col gap-2 items-end z-[60]">
                            <div className="relative">
                                <button 
                                    onClick={(e) => { 
                                        e.stopPropagation(); 
                                        setActiveDownloadId(activeDownloadId === ex.firestoreId ? null : ex.firestoreId); 
                                    }} 
                                    className="p-3 bg-zinc-900/90 backdrop-blur-md text-white rounded-2xl shadow-xl hover:bg-red-600 transition-all flex items-center justify-center border border-white/5"
                                    title="Baixar Vídeo"
                                >
                                    <Icon name="download" className="w-4 h-4" />
                                </button>
                                
                                {activeDownloadId === ex.firestoreId && (
                                    <div className="absolute top-full right-0 mt-2 bg-zinc-950 border border-white/10 rounded-2xl shadow-[0_0_30px_rgba(0,0,0,0.8)] flex flex-col overflow-hidden animate-fade-in w-28 origin-top-right z-[9999]">
                                        <div className="px-3 py-2 bg-white/5 border-b border-white/10 text-[8px] text-zinc-400 font-black uppercase text-center tracking-widest">
                                            Qualidade
                                        </div>
                                        {['4K', '1080p', '720p', '480p'].map(quality => {
                                            if (quality === '4K') {
                                                return (
                                                    <button 
                                                        key={quality} 
                                                        type="button"
                                                        onClick={(e) => handleDownloadCheck(e, ex, quality)}
                                                        className="w-full px-4 py-3 text-[10px] font-black uppercase tracking-widest hover:bg-red-600 text-white transition-colors text-center border-b border-white/5 last:border-0"
                                                    >
                                                        {quality}
                                                    </button>
                                                );
                                            } else {
                                                return (
                                                    <button 
                                                        key={quality} 
                                                        type="button"
                                                        onClick={(e) => { 
                                                            e.stopPropagation(); 
                                                            setActiveDownloadId(null);
                                                            showToast(`"${ex.name}" em ${quality} estará disponível em breve!`);
                                                        }}
                                                        className="w-full px-4 py-3 text-[10px] font-black uppercase tracking-widest hover:bg-red-600 text-white transition-colors text-center border-b border-white/5 last:border-0"
                                                    >
                                                        {quality}
                                                    </button>
                                                );
                                            }
                                        })}
                                    </div>
                                )}
                            </div>

                            {isAdmin && (
                                <div className="flex flex-col gap-2 opacity-0 group-hover:opacity-100 transition-all duration-300 translate-x-4 group-hover:translate-x-0">
                                    <button onClick={(e) => { 
                                        e.stopPropagation();
                                        setForm({...ex, muscleGroups: Array.isArray(ex.muscleGroups) ? ex.muscleGroups.join(', ') : '', keywords: Array.isArray(ex.keywords) ? ex.keywords.join(', ') : ''}); 
                                        setEditingId(ex.firestoreId); 
                                        setAdminTab('single');
                                        setShowAdminPanel(true); 
                                    }} className="p-3 bg-white text-black rounded-2xl shadow-xl hover:bg-red-600 hover:text-white transition-all"><Icon name="pencil" className="w-5 h-5" /></button>
                                    
                                    <button onClick={(e) => { 
                                        e.stopPropagation();
                                        if(confirm("Excluir exercício?")) { const path = getDbPath(); window.fb.deleteDoc(window.fb.doc(window.fb.db, ...path, ex.firestoreId)); } 
                                    }} className="p-3 bg-zinc-900 text-white rounded-2xl shadow-xl hover:bg-red-600 transition-all"><Icon name="trash" className="w-5 h-5" /></button>
                                </div>
                            )}
                        </div>

                        <div className="absolute bottom-5 left-5 right-5 z-30">
                            <p className="text-[9px] font-black text-red-600 uppercase tracking-widest mb-1 italic opacity-80">{ex.category}</p>
                            <h3 
                                className={`font-bold text-sm leading-tight uppercase italic text-white mb-3 cursor-pointer active:opacity-70 transition-all ${isExpanded ? '' : 'line-clamp-2'}`} 
                                title={ex.name}
                                onClick={(e) => {
                                    e.stopPropagation();
                                    setIsExpanded(!isExpanded);
                                }}
                            >
                                {ex.name}
                            </h3>
                            <div className="flex flex-wrap gap-1">
                                {Array.isArray(ex.muscleGroups) && ex.muscleGroups.map((m, i) => (
                                    <span key={i} className="text-[7px] bg-white/10 text-zinc-400 px-2 py-0.5 rounded uppercase font-black border border-white/5">{m}</span>
                                ))}
                            </div>
                        </div>
                    </div>
                    <div className="p-4 grid grid-cols-4 gap-2 bg-zinc-950 z-30">
                        <a href={ex.youtubeUrl} target="_blank" className="col-span-3 bg-white text-black py-4 rounded-2xl flex items-center justify-center gap-2 font-black text-[10px] hover:bg-red-600 hover:text-white transition-all uppercase italic shadow-lg active:scale-95">
                            <Icon name="youtube" className="w-4 h-4" /> VÍDEO
                        </a>
                        <div className="tooltip-container">
                            <button onClick={() => copyLink(ex.youtubeUrl, ex.firestoreId)} className={`w-full h-full rounded-2xl flex items-center justify-center border transition-all active:scale-95 ${copiedId === ex.firestoreId ? 'bg-green-600 border-green-500 text-white' : 'bg-zinc-900 border-white/10 text-zinc-500 hover:text-white hover:border-red-600'}`}>
                                <Icon name={copiedId === ex.firestoreId ? "check" : "copy"} className="w-5 h-5" />
                            </button>
                            <span className="tooltip-text">copiar url do vídeo</span>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [authLoading, setAuthLoading] = useState(true);
            const [loginEmail, setLoginEmail] = useState('');
            const [loginPassword, setLoginPassword] = useState('');
            const [registerPasswordConfirm, setRegisterPasswordConfirm] = useState(''); 
            const [registerName, setRegisterName] = useState(''); 
            const [showPassword, setShowPassword] = useState(false);
            const [authMode, setAuthMode] = useState('login'); 

            const [user, setUser] = useState(null);
            const [userProfile, setUserProfile] = useState(null); 
            
            const [exercises, setExercises] = useState([]);
            const [loading, setLoading] = useState(true);
            const [slowConnection, setSlowConnection] = useState(false);
            
            const [searchTerm, setSearchTerm] = useState(() => localStorage.getItem('dmx_search') || '');
            const [activeCategory, setActiveCategory] = useState(() => localStorage.getItem('dmx_category') || 'Todos');
            
            const [copiedId, setCopiedId] = useState(null);

            const runCloudAudit = async () => {
                const exercisesToAudit = exercises.filter(ex => !isExerciseIncomplete(ex.youtubeUrl));

                if (exercisesToAudit.length === 0) {
                    showToast("Não há exercícios preenchidos para auditar.", "error");
                    return;
                }

                if (!confirm(`Iniciando Verificação Otimizada...\n\nO sistema irá analisar o peso e o DNA exclusivamente dos ${exercisesToAudit.length} exercícios já preenchidos no YouTube, procurando por vídeos esquecidos no Cloud Storage. Deseja iniciar?`)) return;

                setIsAuditing(true);
                setAuditProgress(0);
                
                let found = 0;
                let missing = 0;
                let checked = 0;

                let batch = window.fb.writeBatch(window.fb.db);
                let batchCount = 0;

                for (let i = 0; i < exercisesToAudit.length; i++) {
                    const ex = exercisesToAudit[i];
                    setAuditCurrentItem(ex.id);
                    let isUpado = false;

                    if (!ex.id) {
                        isUpado = false;
                    } else {
                        const gcpApiUrl = `https://storage.googleapis.com/storage/v1/b/biblioteca-dmx-videos-oficiais/o/${ex.id}_4K.mp4`;
                        try {
                            const response = await fetch(gcpApiUrl, { method: 'GET', cache: 'no-store', headers: { 'Accept': 'application/json' }});
                            if (response.ok) isUpado = true;
                            else isUpado = false;
                        } catch (error) {
                            if (!navigator.onLine) {
                                showToast("Auditoria interrompida: Falha de rede.", "error");
                                setIsAuditing(false);
                                return;
                            }
                            isUpado = false;
                        }
                    }

                    if (isUpado) found++; else missing++;

                    if (ex.hasCloudVideo !== isUpado) {
                        const path = getDbPath();
                        const docRef = window.fb.doc(window.fb.db, ...path, ex.firestoreId);
                        batch.update(docRef, { hasCloudVideo: isUpado });
                        batchCount++;

                            batch = window.fb.writeBatch(window.fb.db);
                            batchCount = 0;
                        }
                    }

                    checked++;
                    setAuditStats({ checked, found, missing });
                    setAuditProgress(Math.round((checked / exercisesToAudit.length) * 100));
                    await new Promise(r => setTimeout(r, 60));

                if (batchCount > 0) await batch.commit();

                try {
                    const response = await fetch(gcpApiUrl, { method: 'GET', cache: 'no-store', headers: { 'Accept': 'application/json' }});

                } catch (err) {

                    else showToast(`Falha de conexão à internet.`, "error");
                }

            const filteredExercises = useMemo(() => {
                const validExercises = exercises.filter(ex => {
                    if (isAdmin) {
                        if (adminFilter === 'completed') return !isExerciseIncomplete(ex.youtubeUrl);
                        if (adminFilter === 'incomplete') return isExerciseIncomplete(ex.youtubeUrl);

                        if (adminFilter === 'upados_cloud') return !isExerciseIncomplete(ex.youtubeUrl) && ex.hasCloudVideo === true;

                    return !isExerciseIncomplete(ex.youtubeUrl);
                });

                if (!searchTerm.trim()) {
                    return validExercises.filter(ex => activeCategory === 'Todos' || ex.category === activeCategory);
                }

                const rawSearch = searchTerm.toLowerCase();
                const searchParts = rawSearch.split(/[\s+&]+|\band\b/i).filter(Boolean);

                return validExercises.filter(ex => {

                    const muscles = Array.isArray(ex.muscleGroups) ? ex.muscleGroups.map(m => String(m).toLowerCase()) : [];
                    
                    const matchesSearch = searchParts.every(part => safeId.includes(part) || safeName.includes(part) || keywords.some(k => k.includes(part)) || muscles.some(m => m.includes(part)));
                    return (activeCategory === 'Todos' || ex.category === activeCategory) && matchesSearch;

            const handleSave = async (e) => {
                e.preventDefault();

                if (!targetId && !editingId) {
                    const existingIds = exercises.map(ex => parseInt(ex.id, 10)).filter(id => !isNaN(id));
                    existingIds.sort((a, b) => a - b);
                    let nextAvailableId = 1;
                    for (let i = 0; i < existingIds.length; i++) {
                        if (existingIds[i] === nextAvailableId) nextAvailableId++;
                        else if (existingIds[i] > nextAvailableId) break;
                    }
                    targetId = String(nextAvailableId).padStart(4, '0');
                }

                const isDuplicateId = exercises.some(ex => String(ex.id) === targetId && ex.firestoreId !== editingId);
                if (isDuplicateId) { showToast(`Erro: O ID "${targetId}" já está em uso!`, "error"); return; }

                const targetName = String(form.name).trim().toLowerCase();
                const isDuplicateName = exercises.some(ex => String(ex.name).trim().toLowerCase() === targetName && ex.firestoreId !== editingId);
                if (isDuplicateName) { showToast(`Erro: Já existe um exercício com o nome exato "${form.name.trim()}"!`, "error"); return; }

                try {
                    const data = { ...form, id: targetId, muscleGroups: parseCommaList(form.muscleGroups), keywords: parseCommaList(form.keywords), updatedAt: new Date().toISOString() };
                    if (!editingId) data.hasCloudVideo = null;

                    if (editingId) {
                        await window.fb.updateDoc(window.fb.doc(window.fb.db, ...path, editingId), data);

                        // LÓGICA DE DISPARO DO SINO 🔔 (ACUMULATIVA E COM MINIATURA)
                        if (sendNotification) {
                            let notifThumb = data.thumbnail;
                            if (!notifThumb && data.youtubeUrl) {
                                const ytId = getYouTubeId(data.youtubeUrl);
                                if (ytId) notifThumb = `https://img.youtube.com/vi/${ytId}/hqdefault.jpg`;
                            }

                            const notifPath = getDbPath().slice(0, -1).concat(['notifications']);
                            await window.fb.addDoc(window.fb.collection(window.fb.db, ...notifPath), {
                                title: 'NOVO EXERCÍCIO',
                                message: `"${data.name}" foi adicionado à biblioteca.`,
                                thumbnail: notifThumb || '', 
                                type: 'new_exercise',
                                exerciseId: targetId,
                                createdAt: new Date().toISOString()

                        if (sendEmail && appSettings.webhookUrl) {
                            try {
                                fetch(appSettings.webhookUrl, {
                                    method: 'POST',
                                    body: JSON.stringify({
                                        event: 'new_exercise_added',
                                        exercise_name: data.name,
                                        exercise_id: data.id,
                                        category: data.category,
                                        url: data.youtubeUrl
                                    })
                                });
                                showToast("Sinal de e-mail enviado ao Zapier!");
                            } catch(e) { console.error("Webhook falhou"); }
                        }
                        
                        showToast("Salvo! Pronto para adicionar o próximo.");
                    }
                    
                    setEditingId(null); 
                    setForm({ id: '', name: '', category: 'Quadríceps', muscleGroups: '', youtubeUrl: '', thumbnail: '', keywords: '', hasCloudVideo: null });
                } catch (e) { showToast("Erro ao gravar. O servidor negou permissão.", "error"); }
            };

            const handleBatchImport = async () => {
                if (!batchInput.trim()) return;
                setSyncing(true);
                try {
                    let dataArray = JSON.parse(batchInput);
                    if (!Array.isArray(dataArray)) throw new Error("JSON deve ser um Array");

                    const existingNames = exercises.map(ex => String(ex.name).trim().toLowerCase());
                    const existingIdsStr = exercises.map(ex => String(ex.id));
                    const existingIdsNum = exercises.map(ex => parseInt(ex.id, 10)).filter(id => !isNaN(id));

                    const newDataArray = [];
                    let skippedCount = 0;
                    const namesInCurrentBatch = new Set(); 

                    for (const item of dataArray) {
                        const itemName = String(item.name || '').trim().toLowerCase();
                        if (!itemName) continue; 

                        if (existingNames.includes(itemName) || namesInCurrentBatch.has(itemName)) {
                            skippedCount++;
                            continue;
                        }
                        
                        namesInCurrentBatch.add(itemName);
                        newDataArray.push(item);
                    }

                    if (newDataArray.length === 0) {
                        showToast(`Aviso: Todos os ${skippedCount} exercícios da lista já existem na base!`, "error");
                        setSyncing(false);
                        return;
                    }

                    let nextAvailableId = 1;
                    const finalDataArray = newDataArray.map(item => {
                        let targetId = String(item.id || '').trim();
                        if (!targetId || existingIdsStr.includes(targetId)) {
                            while (existingIdsNum.includes(nextAvailableId)) nextAvailableId++;

                            existingIdsNum.push(parseInt(targetId, 10));
                            existingIdsStr.push(targetId);
                        }
                        return { ...item, id: targetId, hasCloudVideo: null };
                    });

                    const path = getDbPath();
                    const collRef = window.fb.collection(window.fb.db, ...path);

                                        <button onClick={() => !editingId && setAdminTab('single')} className={`text-[9px] sm:text-[10px] font-black uppercase tracking-widest pb-3 border-b-2 transition-all ${adminTab === 'single' ? 'text-red-600 border-red-600' : 'text-zinc-600 border-transparent hover:text-white'}`}>{editingId ? 'EDITAR REGISTRO' : 'CADASTRO ÚNICO'}</button>
                                        {!editingId && <button onClick={() => setAdminTab('batch')} className={`text-[9px] sm:text-[10px] font-black uppercase tracking-widest pb-3 border-b-2 transition-all ${adminTab === 'batch' ? 'text-red-600 border-red-600' : 'text-zinc-600 border-transparent hover:text-white'}`}>IMPORTAR LOTE</button>}
                                        {!editingId && <button onClick={() => setAdminTab('audit')} className={`text-[9px] sm:text-[10px] font-black uppercase tracking-widest pb-3 border-b-2 transition-all ${adminTab === 'audit' ? 'text-indigo-500 border-indigo-500' : 'text-zinc-600 border-transparent hover:text-white'}`}>AUDITORIA NUVEM</button>}
                                        {!editingId && <button onClick={() => setAdminTab('users')} className={`text-[9px] sm:text-[10px] font-black uppercase tracking-widest pb-3 border-b-2 transition-all flex items-center gap-1 ${adminTab === 'users' ? 'text-emerald-500 border-emerald-500' : 'text-zinc-600 border-transparent hover:text-white'}`}><Icon name="users" className="w-3 h-3" /> GERIR ALUNOS</button>}
                                        {!editingId && <button onClick={() => setAdminTab('settings')} className={`text-[9px] sm:text-[10px] font-black uppercase tracking-widest pb-3 border-b-2 transition-all flex items-center gap-1 ${adminTab === 'settings' ? 'text-amber-500 border-amber-500' : 'text-zinc-600 border-transparent hover:text-white'}`}><Icon name="settings" className="w-3 h-3" /> CONFIGURAÇÕES</button>}
                                    </div>
                                    <button onClick={() => {setShowAdminPanel(false); setEditingId(null); setAdminTab('single');}} className="p-3 bg-white/5 hover:bg-red-600 text-white rounded-2xl transition-all -mt-4 shrink-0 ml-4"><Icon name="x" className="w-5 h-5" /></button>
                                </div>

                                {adminTab === 'single' ? (
                                    <form onSubmit={handleSave} className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                        <div className="space-y-1"><label className="text-[9px] font-black uppercase text-zinc-600 ml-2">ID Único (Opcional)</label><input placeholder="Ex: 0045 (ou deixe em branco)" className="w-full p-4 rounded-2xl text-sm" value={form.id} onChange={e => setForm({...form, id: e.target.value})} /></div>
                                        <div className="space-y-1"><label className="text-[9px] font-black uppercase text-zinc-600 ml-2">Nome</label><input required placeholder="Supino Reto" className="w-full p-4 rounded-2xl text-sm" value={form.name} onChange={e => setForm({...form, name: e.target.value})} /></div>
                                        <div className="space-y-1"><label className="text-[9px] font-black uppercase text-zinc-600 ml-2">Categoria Filtro</label><select className="w-full p-4 rounded-2xl text-sm appearance-none" value={form.category} onChange={e => setForm({...form, category: e.target.value})}>{categories.slice(1).map(c => <option key={c} value={c} className="bg-black">{c}</option>)}</select></div>
                                        <div className="space-y-1"><label className="text-[9px] font-black uppercase text-zinc-600 ml-2">YouTube URL</label><input required placeholder="URL completa" className="w-full p-4 rounded-2xl text-sm" value={form.youtubeUrl} onChange={e => setForm({...form, youtubeUrl: e.target.value})} /></div>
                                        <div className="sm:col-span-2 space-y-1"><label className="text-[9px] font-black uppercase text-red-600 ml-2 tracking-widest">Músculos Trabalhados (Separe por vírgula)</label><input placeholder="Peitoral Maior, Tríceps, Deltoide Anterior" className="w-full p-4 rounded-2xl text-sm border-red-900/30" value={form.muscleGroups} onChange={e => setForm({...form, muscleGroups: e.target.value})} /></div>
                                        <div className="sm:col-span-2 space-y-1"><label className="text-[9px] font-black uppercase text-zinc-600 ml-2">Link da Capa (Opcional)</label><input placeholder="Deixe em branco p/ usar o ID do GitHub ou do Youtube" className="w-full p-4 rounded-2xl text-sm" value={form.thumbnail} onChange={e => setForm({...form, thumbnail: e.target.value})} /></div>
                                        <div className="sm:col-span-2 space-y-1"><label className="text-[9px] font-black uppercase text-zinc-600 ml-2">Tags / Keywords</label><textarea placeholder="Perna, Quadríceps..." className="w-full p-4 rounded-2xl text-sm min-h-[100px]" value={form.keywords} onChange={e => setForm({...form, keywords: e.target.value})} /></div>
                                        
                                        {!editingId && (
                                            <div className="sm:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-4 mt-2">
                                                <div className="flex items-center gap-3 bg-red-900/10 p-4 rounded-2xl border border-red-500/20 transition-all hover:bg-red-900/20 cursor-pointer" onClick={() => setSendNotification(!sendNotification)}>
                                                    <input type="checkbox" checked={sendNotification} onChange={() => {}} className="w-5 h-5 accent-red-600 rounded bg-black border-white/10 pointer-events-none" />
                                                    <label className="text-[10px] font-black uppercase text-red-500 tracking-widest cursor-pointer select-none">
                                                        Alerta no Sino 🔔
                                                    </label>
                                                </div>
                                                <div className="flex items-center gap-3 bg-amber-900/10 p-4 rounded-2xl border border-amber-500/20 transition-all hover:bg-amber-900/20 cursor-pointer" onClick={() => setSendEmail(!sendEmail)}>
                                                    <input type="checkbox" checked={sendEmail} onChange={() => {}} className="w-5 h-5 accent-amber-600 rounded bg-black border-white/10 pointer-events-none" />
                                                    <label className="text-[10px] font-black uppercase text-amber-500 tracking-widest cursor-pointer select-none flex items-center gap-2">
                                                        <Icon name="mail" className="w-4 h-4" /> Disparar E-mail
                                                    </label>
                                                </div>
                                            </div>
                                        )}

                                        <button type="submit" className="sm:col-span-2 bg-red-600 py-5 rounded-3xl font-black uppercase tracking-[0.3em] text-xs shadow-2xl shadow-red-600/40 hover:bg-red-700 transition-all flex items-center justify-center gap-2 mt-4"><Icon name="save" className="w-5 h-5" /> {editingId ? 'SALVAR ALTERAÇÕES' : 'SALVAR NO ATLAS'}</button>
                                    </form>
                                ) : adminTab === 'batch' ? (
                                    <div className="flex flex-col gap-6 animate-fade-in">
                                        <p className="text-[11px] text-zinc-400 font-medium leading-relaxed">Cole abaixo o seu Array JSON. O sistema irá converter automaticamente as strings de <b>muscleGroups</b> e <b>keywords</b> em Arrays de busca e enviar para a nuvem via processo em lote (Batch).</p>
                                        <textarea placeholder='[ { "name": "Agachamento" } ]' className="w-full bg-[#050505] p-6 rounded-3xl border border-white/5 min-h-[250px] text-[11px] font-mono text-zinc-300 outline-none focus:border-red-600/30" value={batchInput} onChange={e => setBatchInput(e.target.value)} />
                                        <button onClick={handleBatchImport} disabled={syncing} className="bg-red-600 py-5 rounded-3xl font-black uppercase tracking-[0.2em] flex items-center justify-center gap-3 text-xs shadow-xl shadow-red-600/30 hover:bg-red-700 transition-all disabled:opacity-50">{syncing ? <Icon name="loader" className="animate-spin w-5 h-5" /> : <Icon name="save" className="w-5 h-5" />} {syncing ? 'SINCRONIZANDO LOTE...' : 'EXECUTAR IMPORTAÇÃO EM MASSA'}</button>
                                    </div>
                                ) : adminTab === 'audit' ? (
                                    <div className="flex flex-col gap-6 animate-fade-in">
                                        <div className="bg-indigo-950/30 border border-indigo-500/20 p-6 sm:p-8 rounded-[2.5rem]">
                                            <h3 className="text-white font-black text-lg mb-2 flex items-center gap-3"><Icon name="server" className="w-6 h-6 text-indigo-500" /> Sincronização Inteligente Cloud</h3>
                                            <p className="text-zinc-400 text-xs mb-8 leading-relaxed">
                                                Este robô auditor vai varrer de forma otimizada os seus exercícios já preenchidos e conectar-se à porta do Google Cloud Storage para verificar automaticamente se o ficheiro `.mp4` correspondente já foi devidamente upado. As informações da base de dados serão atualizadas silenciosamente.
                                            </p>
                                            
                                            <div className="flex flex-col sm:flex-row items-center gap-4 mb-6">
                                                <button onClick={runCloudAudit} disabled={isAuditing} className="w-full sm:w-auto bg-indigo-600 py-4 px-8 rounded-2xl font-black uppercase tracking-widest flex items-center justify-center gap-3 text-[10px] sm:text-xs shadow-xl shadow-indigo-600/30 hover:bg-indigo-700 transition-all disabled:opacity-50 text-white">
                                                    {isAuditing ? <Icon name="loader" className="animate-spin w-5 h-5" /> : <Icon name="cloud" className="w-5 h-5" />} 
                                                    {isAuditing ? 'VARRENDO NUVEM...' : `INICIAR VARREDURA OTIMIZADA`}
                                                </button>
                                                {isAuditing && <span className="text-indigo-400 font-black text-[10px] uppercase tracking-widest">{auditProgress}% Concluído (ID: {auditCurrentItem})</span>}
                                            </div>

                                            {isAuditing && (
                                                <div className="w-full bg-black rounded-full h-3 mb-8 overflow-hidden border border-white/5">
                                                    <div className="bg-indigo-500 h-3 transition-all duration-300" style={{ width: `${auditProgress}%` }}></div>
                                                </div>
                                            )}

                                            {(auditStats.checked > 0) && (
                                                <div className="grid grid-cols-3 gap-2 sm:gap-4 text-center mt-6">
                                                    <div className="bg-black p-4 rounded-2xl border border-white/5">
                                                        <span className="block text-zinc-500 text-[8px] sm:text-[9px] uppercase font-black mb-1">Verificados</span>
                                                        <span className="text-white font-black text-lg sm:text-2xl">{auditStats.checked}</span>
                                                    </div>
                                                    <div className="bg-emerald-950/20 p-4 rounded-2xl border border-emerald-500/20">
                                                        <span className="block text-emerald-500/70 text-[8px] sm:text-[9px] uppercase font-black mb-1">Upados 4K</span>
                                                        <span className="text-emerald-500 font-black text-lg sm:text-2xl">{auditStats.found}</span>
                                                    </div>
                                                    <div className="bg-red-950/20 p-4 rounded-2xl border border-red-500/20">
                                                        <span className="block text-red-500/70 text-[8px] sm:text-[9px] uppercase font-black mb-1">Faltam Nuvem</span>
                                                        <span className="text-red-500 font-black text-lg sm:text-2xl">{auditStats.missing}</span>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                ) : adminTab === 'settings' ? (
                                    <div className="flex flex-col gap-6 animate-fade-in">
                                        <div className="bg-amber-950/20 border border-amber-500/20 p-6 sm:p-8 rounded-[2.5rem]">
                                            <h3 className="text-white font-black text-lg mb-2 flex items-center gap-3"><Icon name="mail" className="w-6 h-6 text-amber-500" /> Integração E-mail (Zapier/Make)</h3>
                                            <p className="text-zinc-400 text-[10px] sm:text-xs mb-6 leading-relaxed">
                                                Cole abaixo a <b>Webhook URL</b> fornecida pelo Zapier ou Make.com. Sempre que marcar a opção "Disparar E-mail" num novo exercício, enviaremos um sinal invisível para esta URL contendo o Nome e o Link do exercício para acionar a sua automação de e-mails em massa.
                                            </p>
                                            <form onSubmit={saveSettings} className="space-y-4">
                                                <input required type="url" placeholder="https://hooks.zapier.com/hooks/catch/..." className="w-full bg-[#050505] p-5 rounded-2xl border border-white/10 text-xs font-mono text-zinc-300 outline-none focus:border-amber-500/50" value={appSettings.webhookUrl || ''} onChange={e => setAppSettings({...appSettings, webhookUrl: e.target.value})} />
                                                <button type="submit" className="bg-amber-600 text-black py-4 px-8 rounded-2xl font-black uppercase tracking-widest flex items-center justify-center gap-2 text-[10px] shadow-xl hover:bg-amber-500 transition-all">
                                                    <Icon name="save" className="w-4 h-4" /> Salvar Webhook
                                                </button>
                                            </form>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="flex flex-col gap-4 animate-fade-in">
                                        <div className="flex items-center justify-between bg-emerald-950/20 border border-emerald-500/20 p-6 rounded-[2rem] mb-4">
                                            <div>
                                                <h3 className="text-white font-black text-lg flex items-center gap-2"><Icon name="users" className="text-emerald-500 w-5 h-5" /> Gatekeeper Ativo</h3>
                                                <p className="text-zinc-400 text-[10px] mt-1">Todos os novos cadastros entram como "Pendentes" e exigem a sua aprovação manual abaixo.</p>
                                            </div>
                                            <div className="bg-emerald-500/20 text-emerald-400 font-black text-2xl px-4 py-2 rounded-xl">{appUsers.length}</div>
                                        </div>
                                        
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left border-collapse">
                                                <thead>
                                                    <tr className="border-b border-white/10">
                                                        <th className="py-3 px-4 text-[9px] font-black uppercase text-zinc-500 tracking-widest">Aluno</th>
                                                        <th className="py-3 px-4 text-[9px] font-black uppercase text-zinc-500 tracking-widest">Cadastro</th>
                                                        <th className="py-3 px-4 text-[9px] font-black uppercase text-zinc-500 tracking-widest text-center">Status</th>
                                                        <th className="py-3 px-4 text-[9px] font-black uppercase text-zinc-500 tracking-widest text-right">Ação</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {appUsers.length === 0 ? (
                                                        <tr><td colSpan="4" className="py-8 text-center text-zinc-500 text-[10px] font-black uppercase tracking-widest">Nenhum aluno cadastrado.</td></tr>
                                                    ) : appUsers.map(u => (
                                                        <tr key={u.uid} className="border-b border-white/5 hover:bg-white/5 transition-colors">
                                                            <td className="py-4 px-4">
                                                                <p className="text-xs font-bold text-white">{u.name}</p>
                                                                <p className="text-[10px] text-zinc-500">{u.email}</p>
                                                            </td>
                                                            <td className="py-4 px-4 text-[10px] text-zinc-400">{new Date(u.createdAt).toLocaleDateString('pt-BR')}</td>
                                                            <td className="py-4 px-4 text-center">
                                                                {u.status === 'approved' ? (
                                                                    <span className="bg-emerald-500/20 text-emerald-400 text-[9px] font-black px-2 py-1 rounded uppercase">Aprovado</span>
                                                                ) : u.status === 'blocked' ? (
                                                                    <span className="bg-red-500/20 text-red-400 text-[9px] font-black px-2 py-1 rounded uppercase">Bloqueado</span>
                                                                ) : (
                                                                    <span className="bg-amber-500/20 text-amber-400 text-[9px] font-black px-2 py-1 rounded uppercase animate-pulse">Pendente</span>
                                                                )}
                                                            </td>
                                                            <td className="py-4 px-4 text-right">
                                                                {u.status === 'approved' ? (
                                                                    <button onClick={() => toggleUserStatus(u.uid, u.status)} className="bg-red-950/40 hover:bg-red-600 text-red-500 hover:text-white border border-red-500/30 text-[9px] font-black px-3 py-2 rounded-lg uppercase transition-all">Bloquear</button>
                                                                ) : (
                                                                    <button onClick={() => toggleUserStatus(u.uid, u.status)} className="bg-emerald-950/40 hover:bg-emerald-600 text-emerald-500 hover:text-white border border-emerald-500/30 text-[9px] font-black px-3 py-2 rounded-lg uppercase transition-all">Aprovar</button>
                                                                )}
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
